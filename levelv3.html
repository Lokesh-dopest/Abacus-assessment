<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedic 3 - Abacus Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f4f8; --surface: #ffffff; --border: #dce3ed; --border-hover: #94a3b8;
            --text-primary: #1e293b; --text-secondary: #475569; --text-muted: #94a3b8;
            --brand: #1e40af; --brand-light: #2563eb; --accent: #2563eb; --accent-light: #eff6ff;
            --green: #16a34a; --green-bg: #f0fdf4; --red: #dc2626; --red-bg: #fef2f2;
            --amber: #d97706; --amber-bg: #fffbeb; --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-primary); line-height: 1.5; }
        
        header { position: sticky; top: 0; z-index: 100; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .back-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: 1px solid var(--border); color: var(--text-secondary); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.15s; }
        .back-btn:hover { background: var(--bg); border-color: var(--border-hover); }
        .header-title { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; color: var(--text-primary); }
        .header-level { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .header-stat { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
        .timer-val { color: var(--red) !important; font-variant-numeric: tabular-nums; }
        .divider-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border); }

        .container { max-width: 820px; margin: 0 auto; padding: 24px 20px 60px; }
        .progress-track { height: 3px; background: var(--border); border-radius: 4px; margin-bottom: 28px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }
        
        .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 12px; transition: border-color 0.15s; }
        .q-card:hover { border-color: var(--border-hover); }
        .q-top { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
        .q-num { width: 28px; height: 28px; border-radius: 6px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text-secondary); flex-shrink: 0; }
        .q-expr { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }

        .q-badge { margin-left: auto; flex-shrink: 0; font-size: 10px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; }
        .badge-alg { background: #ccfbf1; color: #115e59; border: 1px solid #99f6e4; }
        .badge-vd { background: #f3e8ff; color: #6b21a8; border: 1px solid #e9d5ff; }
        .badge-m { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }

        .opts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .opt { background: var(--surface); border: 1.5px solid var(--border); padding: 10px 8px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; text-align: center; transition: all 0.12s; user-select: none; }
        .opt:hover { background: var(--accent-light); border-color: var(--accent); }
        .opt.selected { background: var(--brand); color: #fff; border-color: var(--brand); }

        .pagination { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; margin: 32px 0; }
        .pg-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text-secondary); transition: 0.15s; }
        .pg-btn:hover { border-color: var(--border-hover); }
        .pg-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }
        .pg-btn.touched { background: var(--green-bg); color: var(--green); border-color: #bbf7d0; }

        .submit-btn { display: block; width: 100%; max-width: 260px; margin: 0 auto; padding: 14px 24px; background: var(--brand); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .submit-btn:hover { background: #1e3a8a; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 500; padding: 20px; backdrop-filter: blur(4px); }
        .overlay.open { display: flex; }
        .dialog { background: var(--surface); border-radius: 14px; width: 100%; animation: slideUp 0.25s ease; max-width: 380px; text-align: center; padding: 28px 24px 24px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .warn-icon { width: 44px; height: 44px; border-radius: 50%; background: var(--red-bg); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
        .warn-actions { display: flex; gap: 8px; margin-top: 20px; }
        .warn-actions button { flex: 1; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: 0.15s; }
        .btn-cancel { background: var(--bg); border: 1px solid var(--border); }
        .btn-danger { background: var(--red); color: white; }

        .result-dialog { max-width: 440px; padding: 0; }
        .result-top { padding: 28px 28px 0; }
        .score-display { padding: 24px 0 16px; }
        .score-big { font-size: 56px; font-weight: 900; line-height: 1; }
        .result-bar-track { height: 4px; background: var(--border); margin: 0 28px; border-radius: 4px; overflow: hidden; }
        .result-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
        .result-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); margin: 20px 28px 0; border-radius: 8px; overflow: hidden; }
        .rs-item { background: var(--surface); padding: 14px 8px; }
        .rs-val { font-size: 20px; font-weight: 800; }
        .rs-lbl { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        .grade-badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-top: 12px; }
        .result-footer { display: flex; gap: 8px; padding: 20px 28px; }
        .result-footer button { flex: 1; padding: 11px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; }
        .rf-secondary { background: var(--bg); border: 1px solid var(--border); }
        .rf-primary { background: var(--brand); color: white; }

        @media (max-width: 600px) { .opts { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button class="back-btn" onclick="confirmBack()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg> Back</button>
        <div><div class="header-title">Abacus Assessment</div><div class="header-level">Vedic Level 3</div></div>
    </div>
    <div class="header-right">
        <span class="header-stat"><strong class="timer-val" id="timer">10:00</strong></span><span class="divider-dot"></span>
        <span class="header-stat"><strong id="attempted">0</strong> / 251</span>
    </div>
</header>

<div class="container">
    <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>
    <div id="questions"></div>
    <div class="pagination" id="pagination"></div>
    <button class="submit-btn" onclick="handleSubmission()">Submit Test</button>
</div>

<div class="overlay" id="backWarn">
    <div class="dialog warn-dialog">
        <div class="warn-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
        <h3>Leave this test?</h3>
        <p>All your answers and remaining time will be lost.</p>
        <div class="warn-actions">
            <button class="btn-cancel" onclick="closeBackWarn()">Continue</button>
            <button class="btn-danger" onclick="goBack()">Leave</button>
        </div>
    </div>
</div>

<div class="overlay" id="resultModal">
    <div class="dialog result-dialog">
        <div class="result-top"><h2>Test Complete</h2><span class="sub">Vedic Level 3 Assessment</span></div>
        <div style="background: var(--bg); margin: 16px 28px 0; padding: 12px 16px; border-radius: 8px; font-size: 12px; color: var(--text-secondary); border: 1px solid var(--border);">
            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                <span><strong>Name:</strong> <span id="resName"></span></span>
                <span><strong>Branch:</strong> <span id="resBranch"></span></span>
            </div>
            <div style="display: flex; justify-content: center; margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border-hover); font-weight: 500;">
                <span id="resDateTime"></span>
            </div>
        </div>
        <div class="score-display">
            <span class="score-big" id="scoreNum">0</span><span style="font-size:20px; font-weight:600; color:var(--text-muted)"> / <span id="resTotalDisplay">251</span></span>
            <div style="font-size:13px; font-weight:600; margin-top:4px;" id="scorePct">0%</div>
            <div class="grade-badge" id="gradeBadge">-</div>
        </div>
        <div class="result-bar-track"><div class="result-bar-fill" id="resultBar"></div></div>
        <div class="result-stats">
            <div class="rs-item"><div class="rs-val" id="rsCorrect" style="color:var(--green)">0</div><div class="rs-lbl">Correct</div></div>
            <div class="rs-item"><div class="rs-val" id="rsWrong" style="color:var(--red)">0</div><div class="rs-lbl">Wrong</div></div>
            <div class="rs-item"><div class="rs-val" id="rsSkipped" style="color:var(--amber)">0</div><div class="rs-lbl">Skipped</div></div>
        </div>
        <div class="result-footer">
            <button class="rf-secondary" onclick="retakeTest()">Retake</button>
            <button class="rf-primary" onclick="location.href='index.html'">Dashboard</button>
        </div>
    </div>
</div>

<script>
    const TOTAL    = 251; 
    const PER_PAGE = 25; 
    const PAGES    = Math.ceil(TOTAL / PER_PAGE);

    let questions   = JSON.parse(sessionStorage.getItem('v3_questions')) || [];
    let answers     = JSON.parse(sessionStorage.getItem('v3_answers'))   || {};
    let timeLeft    = parseInt(sessionStorage.getItem('v3_time'))        || 600; 
    let currentPage = 1;
    let timerInterval;

    const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const GRADES = [
        { min: 95, grade: 'A+', color: '#166534', bg: '#dcfce7', bar: '#16a34a' },
        { min: 85, grade: 'A',  color: '#155e75', bg: '#cffafe', bar: '#0891b2' },
        { min: 70, grade: 'B',  color: '#1e40af', bg: '#dbeafe', bar: '#3b82f6' },
        { min: 55, grade: 'C',  color: '#92400e', bg: '#fef3c7', bar: '#d97706' },
        { min: 40, grade: 'D',  color: '#9a3412', bg: '#ffedd5', bar: '#ea580c' },
        { min: 0,  grade: 'F',  color: '#991b1b', bg: '#fee2e2', bar: '#dc2626' }
    ];
    const getGrade = pct => GRADES.find(g => pct >= g.min);

    /* ── BIGINT OPTIONS BUILDER ── */
    function buildOptions(correctStr, spread, minVal = 0n) {
        if(correctStr.includes("x") || correctStr.includes("/") || correctStr.includes(".") || correctStr.includes("Q") || isNaN(correctStr.replace(/[^0-9.-]/g,''))) {
            return buildAlgOptions(correctStr);
        }
        let correctBig = BigInt(correctStr);
        let opts = new Set([correctStr]);
        let attempts = 0;
        
        while (opts.size < 4 && attempts < 400) {
            attempts++;
            let delta = BigInt(rand(-spread, spread));
            let cand = correctBig + delta;
            if (cand >= minVal && cand !== correctBig) opts.add(cand.toString());
        }
        let offset = 1n;
        while (opts.size < 4) {
            if (correctBig + offset >= minVal) opts.add((correctBig + offset).toString());
            if (opts.size < 4 && correctBig - offset >= minVal) opts.add((correctBig - offset).toString());
            offset++;
        }
        return Array.from(opts).sort(() => Math.random() - 0.5);
    }

    function buildAlgOptions(correctStr) {
        let opts = new Set([correctStr]);
        let vars = [
            correctStr.replace(/\+/g, '-'), 
            correctStr.replace(/\-/g, '+'),
            correctStr.replace(/2/g, '3'),
            correctStr.replace(/3/g, '4')
        ];
        for(let v of vars) if(opts.size < 4 && v !== correctStr) opts.add(v);
        let count = 1;
        while(opts.size < 4) {
            let f = correctStr.replace(/[0-9]/, count);
            if(!opts.has(f)) opts.add(f); count++; if(count>20) break;
        }
        while(opts.size < 4) opts.add(correctStr + rand(1,9)); 
        return Array.from(opts).sort(() => Math.random() - 0.5);
    }

    /* ── MATH HELPERS ── */
    function gcd(a, b) { return b ? gcd(b, a % b) : Math.abs(a); }
    function simplifyFrac(num, den) {
        if (num === 0) return "0";
        let g = gcd(num, den); num /= g; den /= g;
        return den === 1 ? num.toString() : `${num}/${den}`;
    }
    function formatPoly(c, v, first) {
        if(c===0) return "";
        let sign = c<0?"-":"+";
        let absC = Math.abs(c);
        let cStr = (absC===1 && v!=="") ? "" : absC;
        if(first) return (c<0?"-":"")+cStr+v;
        return ` ${sign} ${cStr}${v}`;
    }
    function getRoot(val) {
        let sum = val.toString().split('').reduce((a,b)=>a+parseInt(b),0);
        while(sum > 9) sum = sum.toString().split('').reduce((a,b)=>a+parseInt(b),0);
        return sum;
    }

    /* ── GENERATORS ── */
    function gDecAdd(d) {
        let a=(rand(Math.pow(10,d-1),Math.pow(10,d)-1)/Math.pow(10,rand(1,d-1))).toFixed(2);
        let b=(rand(Math.pow(10,d-1),Math.pow(10,d)-1)/Math.pow(10,rand(1,d-1))).toFixed(2);
        let c=(parseFloat(a)+parseFloat(b)).toFixed(2);
        return { text: `${a} + ${b}`, options: buildOptions(c,5), correct: c, type: 'm' };
    }
    function gMul(dA,dB) {
        let a=rand(Math.pow(10,dA-1),Math.pow(10,dA)-1);
        let b=dB===1?rand(2,9):rand(Math.pow(10,dB-1),Math.pow(10,dB)-1);
        let c=(BigInt(a)*BigInt(b)).toString();
        return { text: `${a} × ${b}`, options: buildOptions(c,100), correct: c, type: 'vd' };
    }
    function gMulF(dA,fArr) {
        let a=rand(Math.pow(10,dA-1),Math.pow(10,dA)-1), b=fArr[rand(0,fArr.length-1)];
        let c=(BigInt(a)*BigInt(b)).toString();
        return { text: `${a} × ${b}`, options: buildOptions(c,300), correct: c, type: 'vd' };
    }
    function gDecMul() {
        let a=(rand(10,99)/10).toFixed(1), b=(rand(10,99)/10).toFixed(1), c=(parseFloat(a)*parseFloat(b)).toFixed(2);
        return { text: `${a} × ${b}`, options: buildOptions(c,5), correct: c, type: 'm' };
    }
    function gDivFDec(dA,fArr) {
        let a=rand(Math.pow(10,dA-1),Math.pow(10,dA)-1), b=fArr[rand(0,fArr.length-1)], c=parseFloat(a/b).toFixed(2);
        return { text: `${a} ÷ ${b}`, options: buildOptions(c,2), correct: c, type: 'vd' };
    }
    function gMulR(mA,MA,mB,MB) {
        let a=rand(mA,MA), b=rand(mB,MB), c=(BigInt(a)*BigInt(b)).toString();
        return { text: `${a} × ${b}`, options: buildOptions(c,200), correct: c, type: 'vd' };
    }
    function gSqSum() {
        let a=rand(10,99), b=rand(10,99), c=(a*a+b*b).toString();
        return { text: `${a}² + ${b}²`, options: buildOptions(c,400), correct: c, type: 'vd' };
    }
    function gSq(d) {
        let a=rand(Math.pow(10,d-1),Math.pow(10,d)-1), c=(BigInt(a)*BigInt(a)).toString();
        return { text: `${a}²`, options: buildOptions(c,300), correct: c, type: 'vd' };
    }
    function gMulSum() {
        let a=rand(10,99), b=rand(2,9), c=rand(10,99), d=rand(2,9), ans=(a*b+c*d).toString();
        return { text: `(${a}×${b}) + (${c}×${d})`, options: buildOptions(ans,100), correct: ans, type: 'm' };
    }
    function gSer9Sq() {
        let v="9".repeat(rand(2,5))+rand(1,9), c=(BigInt(v)**2n).toString();
        return { text: `${v}²`, options: buildOptions(c,500), correct: c, type: 'sq' };
    }
    function gMul9s(d,n) {
        let a=rand(Math.pow(10,d-1),Math.pow(10,d)-1), b="9".repeat(n), c=(BigInt(a)*BigInt(b)).toString();
        return { text: `${a} × ${b}`, options: buildOptions(c,500), correct: c, type: 'vd' };
    }
    function gAlgSq() {
        let a=rand(2,9), b=rand(2,9), iT=Math.random()<0.5;
        let t=iT?`(${a}x+${b}y)²`:`(${a}x+${b})²`, c=iT?`${a*a}x²+${2*a*b}xy+${b*b}y²`:`${a*a}x²+${2*a*b}x+${b*b}`;
        return { text: t, options: buildOptions(c,0), correct: c, type: 'alg' };
    }
    function gAlgMul() {
        let a=rand(1,5), b=rand(-5,5); if(b===0)b=1; let c=rand(1,5), d=rand(-5,5); if(d===0)d=1;
        let t1=`(${formatPoly(a,"x",true)}${formatPoly(b,"",false)})`, t2=`(${formatPoly(c,"x",true)}${formatPoly(d,"",false)})`;
        let A=a*c, B=a*d+b*c, C=b*d;
        let cor = formatPoly(A,"x²",true)+formatPoly(B,"x",false)+formatPoly(C,"",false);
        return { text: `${t1}${t2}`, options: buildOptions(cor,0), correct: cor, type: 'alg' };
    }
    function g10_0XSq() {
        let v="1"+"0".repeat(rand(1,4))+rand(1,9), c=(BigInt(v)**2n).toString();
        return { text: `${v}²`, options: buildOptions(c,300), correct: c, type: 'sq' };
    }
    function gBaseSub() {
        let p=rand(4,6), b=Math.pow(10,p), n=rand(Math.pow(10,p-2),b-1), c=(b-n).toString();
        return { text: `${b} - ${n}`, options: buildOptions(c,80), correct: c, type: 'm' };
    }
    function gDuplex(d) {
        let v=d===2?rand(10,99):(d===3?rand(100,999):rand(1000,9999)), s=v.toString(), c;
        if(d===2) c=2*s[0]*s[1]; else if(d===3) c=2*s[0]*s[2]+s[1]*s[1]; else c=2*s[0]*s[3]+2*s[1]*s[2];
        return { text: `D(${v})`, options: buildOptions(c.toString(),30), correct: c.toString(), type: 'vd' };
    }
    function gComp() {
        let s=rand(100000,999999).toString(); if(Math.random()<0.3)s=s.substring(0,5)+"0";
        return { text: `Comp(${s})`, options: buildOptions((1000000-parseInt(s)).toString(),100), correct: (1000000-parseInt(s)).toString(), type: 'vd' };
    }
    function gZMidMul(z) {
        let a=rand(1,9)+"0".repeat(z)+rand(1,9), b=rand(1,9)+"0".repeat(z)+rand(1,9), c=(BigInt(a)*BigInt(b)).toString();
        return { text: `${a} × ${b}`, options: buildOptions(c,200), correct: c, type: 'vd' };
    }
    function gDivEx(dD,div) {
        let q=rand(Math.ceil(Math.pow(10,dD-1)/div),Math.floor((Math.pow(10,dD)-1)/div));
        return { text: `${q*div} ÷ ${div}`, options: buildOptions(q.toString(),20), correct: q.toString(), type: 'm' };
    }
    function gDivFixAns(dD, divD, ansD) {
        let ans = rand(Math.pow(10,ansD-1)===1?2:Math.pow(10,ansD-1), Math.pow(10,ansD)-1);
        let div = rand(Math.pow(10,divD-1), Math.pow(10,divD)-1);
        let d = ans * div;
        if(d.toString().length !== dD) return gDivFixAns(dD, divD, ansD);
        return { text: `${d} ÷ ${div}`, options: buildOptions(ans.toString(),5), correct: ans.toString(), type: 'm' };
    }
    function gDivFixL(dD, divD) {
        let div = rand(Math.pow(10,divD-1), Math.pow(10,divD)-1);
        let minAns = Math.ceil(Math.pow(10,dD-1)/div);
        let maxAns = Math.floor((Math.pow(10,dD)-1)/div);
        let ans = rand(minAns, maxAns);
        if(ans<2) ans=2;
        let d = ans * div;
        if(d.toString().length !== dD) return gDivFixL(dD, divD);
        return { text: `${d} ÷ ${div}`, options: buildOptions(ans.toString(),20), correct: ans.toString(), type: 'm' };
    }
    function gSub(dA,dB) {
        let a=rand(Math.pow(10,dA-1),Math.pow(10,dA)-1), b=rand(Math.pow(10,dB-1),Math.pow(10,dB)-1);
        return { text: `${Math.max(a,b)} - ${Math.min(a,b)}`, options: buildOptions(Math.abs(a-b).toString(),50), correct: Math.abs(a-b).toString(), type: 'm' };
    }
    function gFrac(sub) {
        let n1=rand(1,9),d1=rand(2,9),n2=rand(1,9),d2=rand(2,9);
        if(sub&&n1/d1<=n2/d2){let t=n1;n1=n2;n2=t;t=d1;d1=d2;d2=t;if(n1/d1===n2/d2)n1++;}
        let c=simplifyFrac(sub?n1*d2-n2*d1:n1*d2+n2*d1,d1*d2);
        return { text: `${n1}/${d1} ${sub?'-':'+'} ${n2}/${d2}`, options: buildOptions(c,0), correct: c, type: 'alg' };
    }
    function gAlgFrac(sub) {
        let n1=rand(1,5),d1=rand(2,5),n2=rand(1,5),d2=rand(2,5);
        if(sub&&n1/d1<=n2/d2){let t=n1;n1=n2;n2=t;t=d1;d1=d2;d2=t;if(n1/d1===n2/d2)n1++;}
        let cB=simplifyFrac(sub?n1*d2-n2*d1:n1*d2+n2*d1,d1*d2);
        let c=cB==="1"?"x":(cB.includes("/")?cB.replace("/","x/"):cB+"x");
        return { text: `${n1===1?'':n1}x/${d1} ${sub?'-':'+'} ${n2===1?'':n2}x/${d2}`, options: buildOptions(c,0), correct: c, type: 'alg' };
    }
    function gLcmHcf(L) {
        let a=rand(10,99),b=rand(10,99), c=L?(a*b)/gcd(a,b):gcd(a,b);
        return { text: `${L?'LCM':'HCF'}(${a},${b})`, options: buildOptions(c.toString(),15), correct: c.toString(), type: 'm' };
    }
    function gSqrt23() {
        let a=rand(10,999); return { text: `√${a*a}`, options: buildOptions(a.toString(),20), correct: a.toString(), type: 'm' };
    }
    function gDRoot() {
        let a=rand(1000,9999999), c=getRoot(a).toString();
        return { text: `D.Root(${a})`, options: buildOptions(c,3), correct: c, type: 'vd' };
    }
    function gMul3(m,M) {
        let a=rand(m,M),b=rand(m,M),c=rand(m,M), cor=(BigInt(a)*BigInt(b)*BigInt(c)).toString();
        return { text: `${a}×${b}×${c}`, options: buildOptions(cor,500), correct: cor, type: 'vd' };
    }
    function gBodmas() {
        let a=rand(2,9),b=rand(2,9),c=rand(2,9),d=rand(2,9), cor=(b+c*d).toString();
        return { text: `${a*b}÷${a} + ${c}×${d}`, options: buildOptions(cor,10), correct: cor, type: 'm' };
    }
    function gCube() { let a=rand(10,99), c=(BigInt(a)**3n).toString(); return { text: `${a}³`, options: buildOptions(c,500), correct: c, type: 'sq' }; }
    function gPctAbs() { 
        let p=[10,20,25,40,50,75][rand(0,5)]; 
        let b=rand(10,99)*(100/p); 
        let c=(p*b/100).toString(); 
        return { text: `${p}% of ${b}`, options: buildOptions(c,20), correct: c, type: 'm' }; 
    }
    function gDecSub(bf) {
        let a=(rand(Math.pow(10,bf+1),Math.pow(10,bf+2)-1)/100).toFixed(2);
        let b=(rand(Math.pow(10,bf+1),Math.pow(10,bf+2)-1)/100).toFixed(2);
        let c=Math.abs(a-b).toFixed(2);
        return { text: `${Math.max(a,b)} - ${Math.min(a,b)}`, options: buildOptions(c,2), correct: c, type: 'm' };
    }
    function gAlgCb() {
        let a=rand(1,3), b=rand(-3,3); if(b===0)b=1; let iT=Math.random()<0.5;
        let t=`(${formatPoly(a,"x",true)}${formatPoly(b,iT?"y":"",false)})³`;
        let cor=formatPoly(a*a*a,"x³",true)+formatPoly(3*a*a*b,iT?"x²y":"x²",false)+formatPoly(3*a*b*b,iT?"xy²":"x",false)+formatPoly(b*b*b,iT?"y³":"",false);
        return { text: t, options: buildOptions(cor,0), correct: cor, type: 'alg' };
    }
    function gAlgM3(v) {
        let a=rand(1,3), b=rand(-3,3); if(b===0)b=1; let c=rand(1,3), d=rand(-3,3), e=rand(-3,3); if(d===0)d=1; if(e===0)e=1;
        let txt, cor;
        if(v===2){ txt=`(x${b<0?'-':'+'}${Math.abs(b)})(x²${d<0?'-':'+'}${Math.abs(d)}x${e<0?'-':'+'}${Math.abs(e)})`; cor=`x³${formatPoly(b+d,"x²",false)}${formatPoly(b*d+e,"x",false)}${formatPoly(b*e,"",false)}`; }
        else { txt=`(x+y+z)(x+2y+3z)`; cor=`x²+3xy+4xz+2y²+5yz+3z²`; }
        return { text: txt, options: buildOptions(cor,0), correct: cor, type: 'alg' };
    }

    /* ── COMPILE 251 QUESTIONS EXACTLY ── */
    function generateQuestions() {
        if (questions.length >= TOTAL) return;
        const pool = [];
        const as = (b) => { for(let i=b.length-1; i>0; i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} pool.push(...b); };
        const addB = (count, fn, ...args) => { let b = []; for(let i=0; i<count; i++) b.push(fn(...args)); as(b); };

        addB(3, gDecAdd, 3);
        addB(3, gDecAdd, 4);
        addB(3, gMul, 2, 1);
        addB(3, gMul, 3, 1);
        addB(3, gMul, 4, 1);
        addB(5, gMul, 2, 2);
        addB(5, gMul, 3, 2);
        addB(5, gMul, 4, 2);
        addB(5, gMul, 3, 3);
        addB(3, gMulF, 5, [5,50,500]);
        addB(3, gMulF, 5, [125,25,250]);
        addB(3, gMul, 4, 3);
        addB(3, gMul, 4, 4);
        addB(10, gDecMul);
        addB(3, gDivFDec, 3, [5,50,500]);
        addB(3, gDivFDec, 3, [125,25,250]);
        addB(3, gMulF, 6, [101]);
        addB(2, gMulF, 6, [1001]);
        addB(2, gMulR, 1000, 9999, 11, 19);
        addB(2, gSqSum);
        addB(2, gSq, 2);
        addB(2, gSq, 3);
        addB(2, gSq, 4);
        addB(2, gMulSum);
        addB(2, gSer9Sq);
        addB(3, gMul9s, 4, 4);
        addB(3, gMul9s, 4, 6);
        addB(3, gMul9s, 4, 2);
        addB(2, gAlgSq);
        addB(2, gAlgMul);
        addB(3, g10_0XSq);
        addB(2, gBaseSub);
        addB(3, gDuplex, 2);
        addB(2, gDuplex, 3);
        addB(2, gDuplex, 4);
        addB(2, gComp);
        addB(3, gMulR, 91, 99, 91, 99);
        addB(3, gMulR, 101, 110, 101, 110);
        addB(3, gZMidMul, 1);
        addB(3, gZMidMul, 2);
        addB(2, gDivEx, 4, 9);
        addB(2, gDivEx, 5, 9);
        addB(2, gMulF, 4, [9]);
        addB(2, gMulF, 5, [9]);
        addB(5, gDivFixAns, 3, 2, 1);
        addB(2, gMulR, 101, 110, 91, 99);
        addB(2, gMulR, 10001, 10010, 1001, 1010);
        addB(2, gMulR, 991, 999, 91, 99);
        addB(2, gSub, 4, 3);
        addB(2, gSub, 2, 2);
        addB(2, gSub, 3, 2);
        addB(2, gSub, 5, 4);
        addB(2, gSub, 5, 5);
        addB(2, gFrac, false);
        addB(2, gFrac, true);
        addB(2, gAlgFrac, false);
        addB(2, gAlgFrac, true);
        addB(5, gLcmHcf, true);
        addB(5, gLcmHcf, false);
        addB(3, gDivFixL, 4, 2);
        addB(3, gDivFixL, 5, 2);
        addB(3, gDivFixL, 4, 3);
        addB(3, gDivFixL, 5, 3);
        addB(8, gSqrt23);
        
        let addBlock = [];
        for(let i=0; i<3; i++) {
            let a = rand(10000, 99999), b = rand(10000, 99999);
            let c = (a+b).toString();
            addBlock.push({ text: `${a} + ${b}`, options: buildOptions(c, 100), correct: c, type: 'm' });
        }
        as(addBlock);

        addB(5, gDRoot);
        addB(5, gMul3, 101, 110);
        addB(5, gMul3, 91, 99);
        addB(5, gMul3, 11, 99);
        addB(5, gBodmas);
        addB(5, gCube);
        addB(5, gPctAbs);
        addB(5, gDecSub, 1);
        addB(5, gDecSub, 2);
        addB(5, gAlgCb);
        addB(5, gAlgM3, 2);
        addB(5, gAlgM3, 3);

        questions = pool.slice(0, TOTAL);
        sessionStorage.setItem('v3_questions', JSON.stringify(questions));
    }

    /* ── Render ── */
    function renderPage(page) {
        currentPage = page;
        const el = document.getElementById('questions'); el.innerHTML = '';
        const start = (page - 1) * PER_PAGE;
        questions.slice(start, start + PER_PAGE).forEach((q, i) => {
            const idx = start + i;
            let badge = '';
            if (q.type === 'm') badge = '<span class="q-badge badge-m">Math</span>';
            else if (q.type === 'alg') badge = '<span class="q-badge badge-alg">Algebra</span>';
            else if (q.type === 'vd' || q.type === 'sq') badge = '<span class="q-badge badge-vd">Vedic</span>';

            const card = document.createElement('div'); card.className = 'q-card';
            let displayQ = q.type !== 'alg' ? q.text.replace(/\+/g, ' + ').replace(/\-/g, ' - ') : q.text;

            card.innerHTML = `<div class="q-top"><div class="q-num">${idx + 1}</div><div class="q-expr">${displayQ} = ?</div>${badge}</div>
                <div class="opts">${q.options.map(o => `<button class="opt${answers[idx] === o ? ' selected' : ''}" onclick="pick(${idx},'${o}')">${o}</button>`).join('')}</div>`;
            el.appendChild(card);
        });
        renderPagination(); updateStats();
    }

    function renderPagination() {
        const nav = document.getElementById('pagination'); nav.innerHTML = '';
        for (let i = 1; i <= PAGES; i++) {
            const s = (i - 1) * PER_PAGE; const done = questions.slice(s, s + PER_PAGE).some((_, j) => answers[s + j] != null);
            const btn = document.createElement('button'); btn.className = `pg-btn${i === currentPage ? ' active' : ''}${done ? ' touched' : ''}`;
            btn.textContent = i; btn.onclick = () => { renderPage(i); scrollTo({ top: 0, behavior: 'smooth' }); }; nav.appendChild(btn);
        }
    }

    function pick(idx, val) { answers[idx] = val; sessionStorage.setItem('v3_answers', JSON.stringify(answers)); renderPage(currentPage); }
    function updateStats() { const n = Object.keys(answers).length; document.getElementById('attempted').textContent = n; document.getElementById('progressBar').style.width = (n / TOTAL * 100) + '%'; }

    /* ── Timer ── */
    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--; sessionStorage.setItem('v3_time', timeLeft);
            const m = Math.floor(timeLeft / 60); const s = timeLeft % 60; document.getElementById('timer').textContent = `${m}:${s < 10 ? '0' + s : s}`;
            if (timeLeft <= 0) handleSubmission();
        }, 1000);
    }

    /* ── Submit ── */
    function handleSubmission() {
        clearInterval(timerInterval);
        // Retrieve details from session
        const sName = sessionStorage.getItem("studentName") || "Unknown";
        const sBranch = sessionStorage.getItem("studentBranch") || "Unknown";
        
        // Generate current IST Date & Time
        const istDateTime = new Date().toLocaleString("en-IN", { 
            timeZone: "Asia/Kolkata",
            dateStyle: "medium", 
            timeStyle: "medium" 
        });

        // Inject into DOM
        document.getElementById('resName').textContent = sName;
        document.getElementById('resBranch').textContent = sBranch;
        document.getElementById('resDateTime').textContent = istDateTime + " (IST)";

        // Clear details so they vanish if the user navigates away directly
        sessionStorage.removeItem("studentName");
        sessionStorage.removeItem("studentBranch");

        if(document.getElementById('resTotalDisplay')) document.getElementById('resTotalDisplay').textContent = TOTAL;
        
        let correct = 0; questions.forEach((q, i) => { if (answers[i] === q.correct) correct++; });
        const attempted = Object.keys(answers).length; const wrong = attempted - correct; const skipped = TOTAL - attempted;
        const pct = Math.round((correct / TOTAL) * 100);
        const band = getGrade(pct);

        document.getElementById('scoreNum').textContent = correct;
        document.getElementById('scorePct').textContent = pct + '%';
        document.getElementById('scorePct').style.color = band.color;
        
        document.getElementById('gradeBadge').textContent = band.grade;
        document.getElementById('gradeBadge').style.background = band.bg;
        document.getElementById('gradeBadge').style.color = band.color;
        
        document.getElementById('rsCorrect').textContent = correct;
        document.getElementById('rsWrong').textContent = wrong;
        document.getElementById('rsSkipped').textContent = skipped;

        document.getElementById('resultBar').style.background = band.bar;
        setTimeout(() => { document.getElementById('resultBar').style.width = pct + '%'; }, 50);

        document.getElementById('resultModal').classList.add('open');

        sessionStorage.removeItem('v3_questions');
        sessionStorage.removeItem('v3_answers');
        sessionStorage.removeItem('v3_time');
    }

    /* ── Back Warning ── */
    function confirmBack() { document.getElementById('backWarn').classList.add('open'); }
    function closeBackWarn() { document.getElementById('backWarn').classList.remove('open'); }
    function goBack() { sessionStorage.removeItem('v3_questions'); sessionStorage.removeItem('v3_answers'); sessionStorage.removeItem('v3_time'); window.location.href = 'index.html'; }
    function retakeTest() { sessionStorage.removeItem('v3_questions'); sessionStorage.removeItem('v3_answers'); sessionStorage.removeItem('v3_time'); location.reload(); }

    /* ── Init ── */
    generateQuestions();
    const im = Math.floor(timeLeft / 60), is = timeLeft % 60;
    document.getElementById('timer').textContent = `${im}:${is < 10 ? '0' + is : is}`;
    renderPage(1);
    startTimer();
</script>
