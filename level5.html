<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 5 - Abacus Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f4f8;
            --surface: #ffffff;
            --border: #dce3ed;
            --border-hover: #94a3b8;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --brand: #1e40af;
            --brand-light: #2563eb;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --green: #16a34a;
            --green-bg: #f0fdf4;
            --red: #dc2626;
            --red-bg: #fef2f2;
            --amber: #d97706;
            --amber-bg: #fffbeb;
            --radius: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ═══ HEADER ═══ */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: 0.15s;
        }
        .back-btn:hover { background: var(--bg); border-color: var(--border-hover); }

        .header-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }
        .header-level {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-stat {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .header-stat strong {
            font-weight: 700;
            color: var(--text-primary);
        }
        .timer-val { color: var(--red) !important; font-variant-numeric: tabular-nums; }

        .divider-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--border);
        }

        /* ═══ CONTAINER ═══ */
        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 24px 20px 60px;
        }

        /* ═══ PROGRESS ═══ */
        .progress-track {
            height: 3px;
            background: var(--border);
            border-radius: 4px;
            margin-bottom: 28px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        /* ═══ QUESTION CARD ═══ */
        .q-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: 12px;
            transition: border-color 0.15s;
        }
        .q-card:hover { border-color: var(--border-hover); }

        .q-top {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .q-num {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .q-expr {
            font-family: 'JetBrains Mono', monospace;
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }

        /* Question type badges */
        .q-badge {
            margin-left: auto;
            flex-shrink: 0;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
        }
        .badge-mul {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fde68a;
        }
        .badge-div {
            background: #e0f2fe;
            color: #0369a1;
            border: 1px solid #bae6fd;
        }
        .badge-rows {
            background: #ede9fe;
            color: #5b21b6;
            border: 1px solid #ddd6fe;
        }
        .badge-dec {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .opts {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .opt {
            background: var(--surface);
            border: 1.5px solid var(--border);
            padding: 10px 8px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            color: var(--text-primary);
            text-align: center;
            transition: all 0.12s;
            user-select: none;
        }
        .opt:hover {
            background: var(--accent-light);
            border-color: var(--accent);
        }
        .opt.selected {
            background: var(--brand);
            color: #fff;
            border-color: var(--brand);
        }

        /* ═══ PAGINATION ═══ */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin: 32px 0;
        }

        .pg-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            transition: 0.15s;
        }
        .pg-btn:hover { border-color: var(--border-hover); }
        .pg-btn.active {
            background: var(--brand);
            color: #fff;
            border-color: var(--brand);
        }
        .pg-btn.touched {
            background: var(--green-bg);
            color: var(--green);
            border-color: #bbf7d0;
        }

        /* ═══ SUBMIT ═══ */
        .submit-btn {
            display: block;
            width: 100%;
            max-width: 260px;
            margin: 0 auto;
            padding: 14px 24px;
            background: var(--brand);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.2px;
            transition: 0.2s;
        }
        .submit-btn:hover { background: #1e3a8a; }

        /* ═══ OVERLAY ═══ */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 500;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .overlay.open { display: flex; }

        .dialog {
            background: var(--surface);
            border-radius: 14px;
            width: 100%;
            animation: slideUp 0.25s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ═══ BACK WARNING DIALOG ═══ */
        .warn-dialog { max-width: 380px; padding: 28px 24px 24px; text-align: center; }
        .warn-dialog .warn-icon {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--red-bg); display: flex;
            align-items: center; justify-content: center; margin: 0 auto 16px;
        }
        .warn-dialog .warn-icon svg { width: 20px; height: 20px; color: var(--red); }
        .warn-dialog h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
        .warn-dialog p  { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.6; }
        .warn-actions { display: flex; gap: 8px; }
        .warn-actions button {
            flex: 1; padding: 10px; border-radius: 8px;
            font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: 0.15s;
        }
        .btn-cancel { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border) !important; }
        .btn-cancel:hover { background: var(--border); }
        .btn-danger { background: var(--red); color: white; }
        .btn-danger:hover { background: #b91c1c; }

        /* ═══ RESULT DIALOG ═══ */
        .result-dialog { max-width: 440px; overflow: hidden; }
        .result-top { padding: 28px 28px 0; text-align: center; }
        .result-top h2 { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
        .result-top .sub { font-size: 12px; color: var(--text-muted); font-weight: 500; }

        .score-display { text-align: center; padding: 24px 0 16px; }
        .score-big     { font-size: 56px; font-weight: 900; letter-spacing: -2px; line-height: 1; }
        .score-total   { font-size: 20px; font-weight: 600; color: var(--text-muted); }
        .score-pct     { font-size: 13px; font-weight: 600; margin-top: 4px; }

        .result-bar-track {
            height: 4px; background: var(--border);
            margin: 0 28px; border-radius: 4px; overflow: hidden;
        }
        .result-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }

        .result-stats {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 1px; background: var(--border);
            margin: 20px 28px 0; border-radius: 8px; overflow: hidden;
        }
        .rs-item { background: var(--surface); padding: 14px 8px; text-align: center; }
        .rs-val  { font-size: 20px; font-weight: 800; line-height: 1.2; }
        .rs-lbl  { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        .grade-badge {
            display: inline-block; padding: 3px 10px; border-radius: 4px;
            font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
            text-transform: uppercase; margin-top: 12px;
        }

        .result-footer {
            display: flex; gap: 8px; padding: 20px 28px 24px; margin-top: 20px;
        }
        .result-footer button {
            flex: 1; padding: 11px; border-radius: 8px;
            font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: 0.15s;
        }
        .rf-secondary { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border) !important; }
        .rf-secondary:hover { background: var(--border); }
        .rf-primary { background: var(--brand); color: #fff; }
        .rf-primary:hover { background: #1e3a8a; }

        /* ═══ RESPONSIVE ═══ */
        @media (max-width: 600px) {
            .opts { grid-template-columns: repeat(2, 1fr); }
            .header-right { gap: 12px; }
            .divider-dot { display: none; }
            .header-stat { font-size: 12px; }
            .q-expr { font-size: 15px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button class="back-btn" onclick="confirmBack()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5"/><path d="m12 19-7-7 7-7"/>
            </svg>
            Back
        </button>
        <div>
            <div class="header-title">Abacus Assessment</div>
            <div class="header-level">Level 5</div>
        </div>
    </div>
    <div class="header-right">
        <span class="header-stat"><strong class="timer-val" id="timer">10:00</strong></span>
        <span class="divider-dot"></span>
        <span class="header-stat"><strong id="attempted">0</strong> / 225</span>
    </div>
</header>

<div class="container">
    <div class="progress-track">
        <div class="progress-fill" id="progressBar"></div>
    </div>

    <div id="questions"></div>
    <div class="pagination" id="pagination"></div>

    <button class="submit-btn" onclick="handleSubmission()">Submit Test</button>
</div>

<!-- Back Warning -->
<div class="overlay" id="backWarn">
    <div class="dialog warn-dialog">
        <div class="warn-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
        </div>
        <h3>Leave this test?</h3>
        <p>All your answers and remaining time will be lost. You will need to restart from the beginning.</p>
        <div class="warn-actions">
            <button class="btn-cancel" onclick="closeBackWarn()">Continue Test</button>
            <button class="btn-danger" onclick="goBack()">Leave</button>
        </div>
    </div>
</div>

<!-- Result Modal -->
<div class="overlay" id="resultModal">
    <div class="dialog result-dialog">
        <div class="result-top">
            <h2>Test Complete</h2>
            <span class="sub">Level 5 Assessment</span>
        </div>
        <div style="background: var(--bg); margin: 16px 28px 0; padding: 12px 16px; border-radius: 8px; font-size: 12px; color: var(--text-secondary); border: 1px solid var(--border);">
            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                <span><strong>Name:</strong> <span id="resName"></span></span>
                <span><strong>Branch:</strong> <span id="resBranch"></span></span>
            </div>
            <div style="display: flex; justify-content: center; margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border-hover); font-weight: 500;">
                <span id="resDateTime"></span>
            </div>
        </div>

        <div class="score-display">
            <span class="score-big" id="scoreNum">0</span><span class="score-total"> / 225</span>
            <div class="score-pct" id="scorePct">0%</div>
            <div class="grade-badge" id="gradeBadge">-</div>
        </div>

        <div class="result-bar-track">
            <div class="result-bar-fill" id="resultBar" style="width:0%"></div>
        </div>

        <div class="result-stats">
            <div class="rs-item">
                <div class="rs-val" id="rsCorrect" style="color:var(--green)">0</div>
                <div class="rs-lbl">Correct</div>
            </div>
            <div class="rs-item">
                <div class="rs-val" id="rsWrong" style="color:var(--red)">0</div>
                <div class="rs-lbl">Wrong</div>
            </div>
            <div class="rs-item">
                <div class="rs-val" id="rsSkipped" style="color:var(--amber)">0</div>
                <div class="rs-lbl">Skipped</div>
            </div>
        </div>

        <div class="result-footer">
            <button class="rf-secondary" onclick="retakeTest()">Retake</button>
            <button class="rf-primary" onclick="location.href='index.html'">Back to Levels</button>
        </div>
    </div>
</div>

<script>
    const TOTAL    = 225; // 9 blocks of 25 questions
    const PER_PAGE = 25;
    const PAGES    = TOTAL / PER_PAGE;

    let questions   = JSON.parse(sessionStorage.getItem('l5_questions')) || [];
    let answers     = JSON.parse(sessionStorage.getItem('l5_answers'))   || {};
    let timeLeft    = parseInt(sessionStorage.getItem('l5_time'))        || 600;
    let currentPage = 1;
    let timerInterval;

    const rand = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;

    /* ── Grade Bands ── */
    const GRADES = [
        { min: 95, grade: 'A+', color: '#166534', bg: '#dcfce7', bar: '#16a34a' },
        { min: 85, grade: 'A',  color: '#155e75', bg: '#cffafe', bar: '#0891b2' },
        { min: 70, grade: 'B',  color: '#1e40af', bg: '#dbeafe', bar: '#3b82f6' },
        { min: 55, grade: 'C',  color: '#92400e', bg: '#fef3c7', bar: '#d97706' },
        { min: 40, grade: 'D',  color: '#9a3412', bg: '#ffedd5', bar: '#ea580c' },
        { min: 0,  grade: 'F',  color: '#991b1b', bg: '#fee2e2', bar: '#dc2626' }
    ];
    const getGrade = pct => GRADES.find(g => pct >= g.min);

    /* ── Build unique-option list (4 options) ── */
    function buildOptions(correct, minVal, spread) {
        const opts = new Set([correct]);
        let attempts = 0;
        while (opts.size < 4 && attempts < 400) {
            attempts++;
            const delta = rand(-spread, spread);
            const candidate = correct + delta;
            if (candidate >= minVal && candidate !== correct) opts.add(candidate);
        }
        let offset = 1;
        while (opts.size < 4) {
            if (correct + offset >= minVal) opts.add(correct + offset);
            if (opts.size < 4 && correct - offset >= minVal) opts.add(correct - offset);
            offset++;
        }
        return Array.from(opts).sort(() => Math.random() - 0.5);
    }

    /* ────────────────────────────────────────────────
       Multiplication: 2-digit × 1-digit
    ──────────────────────────────────────────────── */
    function makeMulQ() {
        const a = rand(10, 99);
        const b = rand(2, 9);
        const correct = a * b;
        return {
            text: `${a} × ${b}`,
            options: buildOptions(correct, 20, 50),
            correct,
            type: 'mul'
        };
    }

    /* ────────────────────────────────────────────────
       Division: 3-digit ÷ 1-digit = 2-digit
    ──────────────────────────────────────────────── */
    function makeDiv3by1Q() {
        let d = rand(2, 9);
        let q = rand(10, 99);
        while (d * q < 100) {
            d = rand(2, 9);
            q = rand(10, 99);
        }
        const dividend = d * q;
        return {
            text: `${dividend} ÷ ${d}`,
            options: buildOptions(q, 10, 15),
            correct: q,
            type: 'div'
        };
    }

    /* ────────────────────────────────────────────────
       Division: 4-digit ÷ 1-digit = 3-digit
    ──────────────────────────────────────────────── */
    function makeDiv4by1Q() {
        let d = rand(2, 9);
        let q = rand(100, 999);
        while (d * q < 1000) {
            d = rand(2, 9);
            q = rand(100, 999);
        }
        const dividend = d * q;
        return {
            text: `${dividend} ÷ ${d}`,
            options: buildOptions(q, 100, 50),
            correct: q,
            type: 'div'
        };
    }

    /* ────────────────────────────────────────────────
       Decimals: Exactly 2 rows (1 operation) (+/-)
    ──────────────────────────────────────────────── */
    function makeDecimalQ() {
        let minVal = 100; // Represents 1.00
        let maxVal = 999; // Represents 9.99

        let num1 = rand(minVal, maxVal);
        let op = Math.random() < 0.5 ? '+' : '-';
        let num2;

        if (op === '-' && num1 <= minVal) {
            op = '+';
        }

        if (op === '-') {
            let currentMaxSub = Math.min(num1 - 1, maxVal);
            num2 = rand(minVal, currentMaxSub);
        } else {
            num2 = rand(minVal, maxVal);
        }

        let running = op === '+' ? num1 + num2 : num1 - num2;

        const formatDec = (n) => (n / 100).toFixed(2);
        let text = `${formatDec(num1)} ${op} ${formatDec(num2)}`;

        let correctVal = running / 100;
        
        // Build integer options, then map to float strings to avoid floating math errors
        const rawOpts = new Set([running]);
        let attempts = 0;
        while(rawOpts.size < 4 && attempts < 200) {
            attempts++;
            let delta = rand(-50, 50);
            if (running + delta > 0 && delta !== 0) rawOpts.add(running + delta);
        }
        let offset = 1;
        while(rawOpts.size < 4) {
            if (running + offset > 0) rawOpts.add(running + offset);
            if (rawOpts.size < 4 && running - offset > 0) rawOpts.add(running - offset);
            offset++;
        }
        
        let finalOpts = Array.from(rawOpts).map(n => Number((n / 100).toFixed(2))).sort(() => Math.random() - 0.5);

        return {
            text: text,
            options: finalOpts,
            correct: Number(correctVal.toFixed(2)),
            type: 'dec'
        };
    }

    /* ────────────────────────────────────────────────
       Addition/Subtraction Rows (+/-)
       Handles constraint: NO negative intermediate step
    ──────────────────────────────────────────────── */
    function makeRowsQ(digits, rows, mix=false) {
        let nums = [], ops = [];
        let minVal = mix ? 1 : (digits === 3 ? 100 : 10);
        let maxVal = mix ? 99 : (digits === 3 ? 999 : 99);

        let running = rand(minVal, maxVal);
        nums.push(running);

        for (let i = 1; i < rows; i++) {
            let op = Math.random() < 0.5 ? '+' : '-';
            let nextNum;

            if (op === '-' && running < minVal) {
                op = '+';
            }

            if (op === '-') {
                let currentMaxSub = Math.min(running, maxVal);
                nextNum = rand(minVal, currentMaxSub);
                running -= nextNum;
            } else {
                nextNum = rand(minVal, maxVal);
                running += nextNum;
            }

            ops.push(op);
            nums.push(nextNum);
        }

        let text = String(nums[0]);
        for (let i = 0; i < ops.length; i++) {
            text += ` ${ops[i]} ${nums[i + 1]}`;
        }

        return {
            text: text,
            options: buildOptions(running, 0, digits === 3 ? 100 : 40),
            correct: running,
            type: 'rows'
        };
    }

    /* ────────────────────────────────────────────────
       Generate all 225 questions following the logic blocks
    ──────────────────────────────────────────────── */
    function generateQuestions() {
        if (questions.length >= TOTAL) return;

        const pool = [];

        const appendShuffled = (block) => {
            for (let i = block.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [block[i], block[j]] = [block[j], block[i]];
            }
            pool.push(...block);
        };

        // 1. 25 ques: 2-digit multiply 1-digit number
        let b1 = []; for(let i=0; i<25; i++) b1.push(makeMulQ()); appendShuffled(b1);
        
        // 2. 25 ques: 4-digit divides 1-digit to get 3-digit
        let b2 = []; for(let i=0; i<25; i++) b2.push(makeDiv4by1Q()); appendShuffled(b2);

        // 3. 25 ques: 2-digit, 5 rows (+ -)
        let b3 = []; for(let i=0; i<25; i++) b3.push(makeRowsQ(2, 5)); appendShuffled(b3);

        // 4. 25 ques: 3-digit, 4 rows (+ -)
        let b4 = []; for(let i=0; i<25; i++) b4.push(makeRowsQ(3, 4)); appendShuffled(b4);

        // 5. 25 ques: Decimal + - (Exactly 2 rows)
        let b5 = []; for(let i=0; i<25; i++) b5.push(makeDecimalQ()); appendShuffled(b5);

        // 6. 25 ques: Mix 2-digit and 1-digit, 6 rows (+ -)
        let b6 = []; for(let i=0; i<25; i++) b6.push(makeRowsQ(2, 6, true)); appendShuffled(b6);

        // 7. 25 ques: 2-digit multiply 1-digit number
        let b7 = []; for(let i=0; i<25; i++) b7.push(makeMulQ()); appendShuffled(b7);

        // 8. 25 ques: 2-digit, 6 rows (+ -)
        let b8 = []; for(let i=0; i<25; i++) b8.push(makeRowsQ(2, 6)); appendShuffled(b8);

        // 9. 25 ques: 3-digit divides 1-digit to get 2-digit
        let b9 = []; for(let i=0; i<25; i++) b9.push(makeDiv3by1Q()); appendShuffled(b9);

        questions = pool;
        sessionStorage.setItem('l5_questions', JSON.stringify(questions));
    }

    /* ── Render ── */
    function renderPage(page) {
        currentPage = page;
        const el    = document.getElementById('questions');
        el.innerHTML = '';
        const start = (page - 1) * PER_PAGE;

        questions.slice(start, start + PER_PAGE).forEach((q, i) => {
            const idx   = start + i;
            let badge   = '';
            if (q.type === 'mul') {
                badge = '<span class="q-badge badge-mul">× Table</span>';
            } else if (q.type === 'div') {
                badge = '<span class="q-badge badge-div">÷ Divide</span>';
            } else if (q.type === 'rows') {
                badge = '<span class="q-badge badge-rows">Add/Sub</span>';
            } else if (q.type === 'dec') {
                badge = '<span class="q-badge badge-dec">Decimal</span>';
            }

            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `
                <div class="q-top">
                    <div class="q-num">${idx + 1}</div>
                    <div class="q-expr">${q.text} = ?</div>
                    ${badge}
                </div>
                <div class="opts">
                    ${q.options.map(o => `
                        <button class="opt${answers[idx] === o ? ' selected' : ''}"
                                onclick="pick(${idx},${o})">${o}</button>
                    `).join('')}
                </div>`;
            el.appendChild(card);
        });

        renderPagination();
        updateStats();
    }

    function renderPagination() {
        const nav = document.getElementById('pagination');
        nav.innerHTML = '';
        for (let i = 1; i <= PAGES; i++) {
            const s    = (i - 1) * PER_PAGE;
            const done = questions.slice(s, s + PER_PAGE).some((_, j) => answers[s + j] != null);
            const btn  = document.createElement('button');
            btn.className  = `pg-btn${i === currentPage ? ' active' : ''}${done ? ' touched' : ''}`;
            btn.textContent = i;
            btn.onclick = () => { renderPage(i); scrollTo({ top: 0, behavior: 'smooth' }); };
            nav.appendChild(btn);
        }
    }

    function pick(idx, val) {
        answers[idx] = val;
        sessionStorage.setItem('l5_answers', JSON.stringify(answers));
        renderPage(currentPage);
    }

    function updateStats() {
        const n = Object.keys(answers).length;
        document.getElementById('attempted').textContent = n;
        document.getElementById('progressBar').style.width = (n / TOTAL * 100) + '%';
    }

    /* ── Timer ── */
    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            sessionStorage.setItem('l5_time', timeLeft);
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer').textContent = `${m}:${s < 10 ? '0' + s : s}`;
            if (timeLeft <= 0) handleSubmission();
        }, 1000);
    }

    /* ── Submit ── */
    function handleSubmission() {
        clearInterval(timerInterval);

        let correct = 0;
        questions.forEach((q, i) => { if (answers[i] === q.correct) correct++; });

        const attempted = Object.keys(answers).length;
        const wrong     = attempted - correct;
        const skipped   = TOTAL - attempted;
        const pct       = Math.round((correct / TOTAL) * 100);
        const band      = getGrade(pct);

        document.getElementById('scoreNum').textContent       = correct;
        document.getElementById('scorePct').textContent       = pct + '%';
        document.getElementById('scorePct').style.color       = band.color;

        const badge = document.getElementById('gradeBadge');
        badge.textContent       = band.grade;
        badge.style.background  = band.bg;
        badge.style.color       = band.color;

        const bar = document.getElementById('resultBar');
        bar.style.background = band.bar;
        setTimeout(() => { bar.style.width = pct + '%'; }, 50);

        document.getElementById('rsCorrect').textContent = correct;
        document.getElementById('rsWrong').textContent   = wrong;
        document.getElementById('rsSkipped').textContent = skipped;
        // Retrieve details from session
        const sName = sessionStorage.getItem("studentName") || "Unknown";
        const sBranch = sessionStorage.getItem("studentBranch") || "Unknown";
        
        // Generate current IST Date & Time
        const istDateTime = new Date().toLocaleString("en-IN", { 
            timeZone: "Asia/Kolkata",
            dateStyle: "medium", 
            timeStyle: "medium" 
        });

        // Inject into DOM
        document.getElementById('resName').textContent = sName;
        document.getElementById('resBranch').textContent = sBranch;
        document.getElementById('resDateTime').textContent = istDateTime + " (IST)";

        // Clear details so they vanish if the user navigates away directly
        sessionStorage.removeItem("studentName");
        sessionStorage.removeItem("studentBranch");

        document.getElementById('resultModal').classList.add('open');
        sessionStorage.removeItem('l5_questions');
        sessionStorage.removeItem('l5_answers');
        sessionStorage.removeItem('l5_time');
    }

    /* ── Back Warning ── */
    function confirmBack() { document.getElementById('backWarn').classList.add('open'); }
    function closeBackWarn() { document.getElementById('backWarn').classList.remove('open'); }
    function goBack() {
        sessionStorage.removeItem('l5_questions');
        sessionStorage.removeItem('l5_answers');
        sessionStorage.removeItem('l5_time');
        window.location.href = 'index.html';
    }
    function retakeTest() {
        sessionStorage.removeItem('l5_questions');
        sessionStorage.removeItem('l5_answers');
        sessionStorage.removeItem('l5_time');
        location.reload();
    }

    /* ── Init ── */
    generateQuestions();
    const im = Math.floor(timeLeft / 60), is = timeLeft % 60;
    document.getElementById('timer').textContent = `${im}:${is < 10 ? '0' + is : is}`;
    renderPage(1);
    startTimer();
</script>
</body>
</html>
