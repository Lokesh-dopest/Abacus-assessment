<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedic 1 - Abacus Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f4f8; --surface: #ffffff; --border: #dce3ed; --border-hover: #94a3b8;
            --text-primary: #1e293b; --text-secondary: #475569; --text-muted: #94a3b8;
            --brand: #1e40af; --brand-light: #2563eb; --accent: #2563eb; --accent-light: #eff6ff;
            --green: #16a34a; --green-bg: #f0fdf4; --red: #dc2626; --red-bg: #fef2f2;
            --amber: #d97706; --amber-bg: #fffbeb; --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-primary); line-height: 1.5; }
        
        header {
            position: sticky; top: 0; z-index: 100; background: var(--surface);
            border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px; background: none;
            border: 1px solid var(--border); color: var(--text-secondary);
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.15s;
        }
        .back-btn:hover { background: var(--bg); border-color: var(--border-hover); }
        .header-title { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
        .header-level { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .header-stat { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
        .header-stat strong { font-weight: 700; color: var(--text-primary); }
        .timer-val { color: var(--red) !important; font-variant-numeric: tabular-nums; }
        .divider-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border); }

        .container { max-width: 820px; margin: 0 auto; padding: 24px 20px 60px; }
        .progress-track { height: 3px; background: var(--border); border-radius: 4px; margin-bottom: 28px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }
        
        .q-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 20px 24px; margin-bottom: 12px; transition: border-color 0.15s;
        }
        .q-card:hover { border-color: var(--border-hover); }
        .q-top { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
        .q-num {
            width: 28px; height: 28px; border-radius: 6px; background: var(--bg); display: flex;
            align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text-secondary); flex-shrink: 0;
        }
        .q-expr { font-family: 'JetBrains Mono', monospace; font-size: 17px; font-weight: 700; letter-spacing: 0.5px; }

        .q-badge { margin-left: auto; flex-shrink: 0; font-size: 10px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; }
        .badge-add { background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
        .badge-mul { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .badge-sq { background: #fce7f3; color: #9d174d; border: 1px solid #fbcfe8; }
        .badge-alg { background: #ccfbf1; color: #115e59; border: 1px solid #99f6e4; }
        .badge-vd { background: #f3e8ff; color: #6b21a8; border: 1px solid #e9d5ff; }
        .badge-cp { background: #e0e7ff; color: #4338ca; border: 1px solid #c7d2fe; }

        .opts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .opt {
            background: var(--surface); border: 1.5px solid var(--border); padding: 10px 8px;
            border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 15px; text-align: center; transition: all 0.12s; user-select: none;
        }
        .opt:hover { background: var(--accent-light); border-color: var(--accent); }
        .opt.selected { background: var(--brand); color: #fff; border-color: var(--brand); }

        .pagination { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; margin: 32px 0; }
        .pg-btn {
            width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface); cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text-secondary); transition: 0.15s;
        }
        .pg-btn:hover { border-color: var(--border-hover); }
        .pg-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }
        .pg-btn.touched { background: var(--green-bg); color: var(--green); border-color: #bbf7d0; }

        .submit-btn {
            display: block; width: 100%; max-width: 260px; margin: 0 auto; padding: 14px 24px;
            background: var(--brand); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .submit-btn:hover { background: #1e3a8a; }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none;
            align-items: center; justify-content: center; z-index: 500; padding: 20px; backdrop-filter: blur(4px);
        }
        .overlay.open { display: flex; }
        .dialog { background: var(--surface); border-radius: 14px; width: 100%; animation: slideUp 0.25s ease; max-width: 380px; text-align: center; padding: 28px 24px 24px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .warn-icon { width: 44px; height: 44px; border-radius: 50%; background: var(--red-bg); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
        .warn-icon svg { width: 20px; height: 20px; color: var(--red); }
        .warn-actions { display: flex; gap: 8px; margin-top: 20px; }
        .warn-actions button { flex: 1; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
        .btn-cancel { background: var(--bg); border: 1px solid var(--border); }
        .btn-danger { background: var(--red); color: white; }

        .result-dialog { max-width: 440px; padding: 0; }
        .result-top { padding: 28px 28px 0; }
        .score-display { padding: 24px 0 16px; }
        .score-big { font-size: 56px; font-weight: 900; line-height: 1; }
        .result-bar-track { height: 4px; background: var(--border); margin: 0 28px; border-radius: 4px; overflow: hidden; }
        .result-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
        .result-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); margin: 20px 28px 0; border-radius: 8px; overflow: hidden; }
        .rs-item { background: var(--surface); padding: 14px 8px; text-align: center; }
        .rs-val { font-size: 20px; font-weight: 800; }
        .rs-lbl { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        .grade-badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-top: 12px; }
        .result-footer { display: flex; gap: 8px; padding: 20px 28px; }
        .result-footer button { flex: 1; padding: 11px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; }
        .rf-secondary { background: var(--bg); border: 1px solid var(--border); }
        .rf-primary { background: var(--brand); color: white; }

        @media (max-width: 600px) { .opts { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button class="back-btn" onclick="confirmBack()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
            Back
        </button>
        <div>
            <div class="header-title">Abacus Assessment</div>
            <div class="header-level">Vedic level 1</div>
        </div>
    </div>
    <div class="header-right">
        <span class="header-stat"><strong class="timer-val" id="timer">10:00</strong></span>
        <span class="divider-dot"></span>
        <span class="header-stat"><strong id="attempted">0</strong> / 220</span>
    </div>
</header>

<div class="container">
    <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>
    <div id="questions"></div>
    <div class="pagination" id="pagination"></div>
    <button class="submit-btn" onclick="handleSubmission()">Submit Test</button>
</div>

<div class="overlay" id="backWarn">
    <div class="dialog warn-dialog">
        <div class="warn-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
        <h3>Leave this test?</h3>
        <p>All your answers and remaining time will be lost.</p>
        <div class="warn-actions">
            <button class="btn-cancel" onclick="closeBackWarn()">Continue</button>
            <button class="btn-danger" onclick="goBack()">Leave</button>
        </div>
    </div>
</div>

<div class="overlay" id="resultModal">
    <div class="dialog result-dialog">
        <div class="result-top">
            <h2>Test Complete</h2><span class="sub" style="font-size:12px; color:var(--text-muted)">Vedic level 1 Assessment</span>
        </div>
        <div style="background: var(--bg); margin: 16px 28px 0; padding: 12px 16px; border-radius: 8px; font-size: 12px; color: var(--text-secondary); border: 1px solid var(--border);">
            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                <span><strong>Name:</strong> <span id="resName"></span></span>
                <span><strong>Branch:</strong> <span id="resBranch"></span></span>
            </div>
            <div style="display: flex; justify-content: center; margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border-hover); font-weight: 500;">
                <span id="resDateTime"></span>
            </div>
        </div>
        <div class="score-display">
            <span class="score-big" id="scoreNum">0</span><span style="font-size:20px; font-weight:600; color:var(--text-muted)"> / 220</span>
            <div style="font-size:13px; font-weight:600; margin-top:4px;" id="scorePct">0%</div>
            <div class="grade-badge" id="gradeBadge">-</div>
        </div>
        <div class="result-bar-track"><div class="result-bar-fill" id="resultBar"></div></div>
        <div class="result-stats">
            <div class="rs-item"><div class="rs-val" id="rsCorrect" style="color:var(--green)">0</div><div class="rs-lbl">Correct</div></div>
            <div class="rs-item"><div class="rs-val" id="rsWrong" style="color:var(--red)">0</div><div class="rs-lbl">Wrong</div></div>
            <div class="rs-item"><div class="rs-val" id="rsSkipped" style="color:var(--amber)">0</div><div class="rs-lbl">Skipped</div></div>
        </div>
        <div class="result-footer">
            <button class="rf-secondary" onclick="retakeTest()">Retake</button>
            <button class="rf-primary" onclick="location.href='index.html'">Dashboard</button>
        </div>
    </div>
</div>

<script>
    const TOTAL    = 220; 
    const PER_PAGE = 20;
    const PAGES    = Math.ceil(TOTAL / PER_PAGE);

    let questions   = JSON.parse(sessionStorage.getItem('bv1_questions')) || [];
    let answers     = JSON.parse(sessionStorage.getItem('bv1_answers'))   || {};
    let timeLeft    = parseInt(sessionStorage.getItem('bv1_time'))        || 600; // 10 mins
    let currentPage = 1;
    let timerInterval;

    const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

    const GRADES = [
        { min: 95, grade: 'A+', color: '#166534', bg: '#dcfce7', bar: '#16a34a' },
        { min: 85, grade: 'A',  color: '#155e75', bg: '#cffafe', bar: '#0891b2' },
        { min: 70, grade: 'B',  color: '#1e40af', bg: '#dbeafe', bar: '#3b82f6' },
        { min: 55, grade: 'C',  color: '#92400e', bg: '#fef3c7', bar: '#d97706' },
        { min: 40, grade: 'D',  color: '#9a3412', bg: '#ffedd5', bar: '#ea580c' },
        { min: 0,  grade: 'F',  color: '#991b1b', bg: '#fee2e2', bar: '#dc2626' }
    ];
    const getGrade = pct => GRADES.find(g => pct >= g.min);

    /* ── BIGINT OPTIONS BUILDER ── */
    function buildOptions(correctStr, spread, minVal = 0n) {
        let correctBig = BigInt(correctStr);
        let opts = new Set([correctStr]);
        let attempts = 0;
        
        while (opts.size < 4 && attempts < 400) {
            attempts++;
            let delta = BigInt(rand(-spread, spread));
            let cand = correctBig + delta;
            if (cand >= minVal && cand !== correctBig) opts.add(cand.toString());
        }
        let offset = 1n;
        while (opts.size < 4) {
            if (correctBig + offset >= minVal) opts.add((correctBig + offset).toString());
            if (opts.size < 4 && correctBig - offset >= minVal) opts.add((correctBig - offset).toString());
            offset++;
        }
        return Array.from(opts).sort(() => Math.random() - 0.5);
    }

    /* ── GENERATORS ── */
    function makeAddQ(digitsA, digitsB) {
        const a = rand(Math.pow(10, digitsA-1), Math.pow(10, digitsA)-1);
        const b = rand(Math.pow(10, digitsB-1), Math.pow(10, digitsB)-1);
        const correct = (a + b).toString();
        return { text: `${a} + ${b}`, options: buildOptions(correct, 50), correct, type: 'add' };
    }

    function makeMulQ(digitsA, digitsB) {
        const a = rand(Math.pow(10, digitsA-1), Math.pow(10, digitsA)-1);
        const b = digitsB === 1 ? rand(2, 9) : rand(Math.pow(10, digitsB-1), Math.pow(10, digitsB)-1);
        const correct = (a * b).toString();
        return { text: `${a} × ${b}`, options: buildOptions(correct, 100), correct, type: 'mul' };
    }

    function makeMulFixedQ(digitsA, fixedBArr) {
        const a = rand(Math.pow(10, digitsA-1), Math.pow(10, digitsA)-1);
        const b = fixedBArr[rand(0, fixedBArr.length-1)];
        const correct = (BigInt(a) * BigInt(b)).toString();
        return { text: `${a} × ${b}`, options: buildOptions(correct, 300), correct, type: 'mul' };
    }

    function makeMulRangeQ(digitsA, minB, maxB) {
        const a = rand(Math.pow(10, digitsA-1), Math.pow(10, digitsA)-1);
        const b = rand(minB, maxB);
        const correct = (a * b).toString();
        return { text: `${a} × ${b}`, options: buildOptions(correct, 150), correct, type: 'mul' };
    }
    
    function makeMulEnd1Q(digitsA) {
        let aBase = digitsA === 2 ? rand(1, 9) : rand(10, 99);
        let a = aBase * 10 + 1;
        let bBase = rand(1, 9);
        let b = bBase * 10 + 1;
        const correct = (BigInt(a) * BigInt(b)).toString();
        return { text: `${a} × ${b}`, options: buildOptions(correct, 150), correct, type: 'vd' };
    }

    function makeSqSumQ() {
        const a = rand(10, 99);
        const b = rand(10, 99);
        const correct = (a*a + b*b).toString();
        return { text: `${a}² + ${b}²`, options: buildOptions(correct, 400), correct, type: 'sq' };
    }

    function makeSqQ(digitsA) {
        const a = rand(Math.pow(10, digitsA-1), Math.pow(10, digitsA)-1);
        const correct = (BigInt(a) * BigInt(a)).toString();
        return { text: `${a}²`, options: buildOptions(correct, 150), correct, type: 'sq' };
    }

    function makeMulSumQ() {
        const a = rand(10, 99); const b = rand(2, 9);
        const c = rand(10, 99); const d = rand(2, 9);
        const correct = (a*b + c*d).toString();
        return { text: `(${a} × ${b}) + (${c} × ${d})`, options: buildOptions(correct, 100), correct, type: 'add' };
    }

    function makeSeries9SqQ() {
        const len = rand(3, 6);
        const last = rand(1, 9);
        const valStr = "9".repeat(len - 1) + last;
        const correct = (BigInt(valStr) ** 2n).toString();
        return { text: `${valStr}²`, options: buildOptions(correct, 500), correct, type: 'sq' };
    }

    function makeMulNinesQ(digits, nines) {
        const a = rand(Math.pow(10, digits-1), Math.pow(10, digits)-1);
        const bStr = "9".repeat(nines);
        const correct = (BigInt(a) * BigInt(bStr)).toString();
        return { text: `${a} × ${bStr}`, options: buildOptions(correct, 500), correct, type: 'vd' };
    }

    function makeAlgebraSqQ() {
        const a = rand(1, 9);
        const b = rand(1, 9);
        const isTwoVar = Math.random() < 0.5;
        let aStr = a === 1 ? "" : a;
        let text = isTwoVar ? `(${aStr}x + ${b}y)²` : `(${aStr}x + ${b})²`;
        let correct = isTwoVar ? `${a*a===1?"":a*a}x² + ${2*a*b}xy + ${b*b}y²` : `${a*a===1?"":a*a}x² + ${2*a*b}x + ${b*b}`;
        
        let opts = new Set([correct]);
        while(opts.size < 4) {
            let fakeA = a + rand(-2, 2); if(fakeA<1) fakeA=1;
            let fakeB = b + rand(-2, 2); if(fakeB<1) fakeB=1;
            let fakeMid = 2*fakeA*fakeB + rand(-4, 4);
            let fAStr = fakeA*fakeA===1 ? "" : fakeA*fakeA;
            let fakeOpt = isTwoVar ? `${fAStr}x² + ${fakeMid}xy + ${fakeB*fakeB}y²` : `${fAStr}x² + ${fakeMid}x + ${fakeB*fakeB}`;
            if(fakeOpt !== correct) opts.add(fakeOpt);
        }
        return { text, options: Array.from(opts).sort(() => Math.random() - 0.5), correct, type: 'alg' };
    }

    function make10_0XSqQ() {
        const len = rand(1, 4);
        let lastDigit = rand(1, 10);
        let valStr = "1" + "0".repeat(len) + lastDigit;
        const correct = (BigInt(valStr) ** 2n).toString();
        return { text: `${valStr}²`, options: buildOptions(correct, 300), correct, type: 'sq' };
    }

    function makeBaseSubQ() {
        const p = rand(3, 7);
        const base = Math.pow(10, p);
        const num = rand(Math.pow(10, p-2), base - 1);
        const correct = (base - num).toString();
        return { text: `${base} - ${num}`, options: buildOptions(correct, 80), correct, type: 'vd' };
    }

    function makeDuplexQ(digits) {
        const val = digits === 2 ? rand(10, 99) : rand(100, 999);
        const s = val.toString();
        let correct;
        if(digits === 2) {
            correct = (2 * parseInt(s[0]) * parseInt(s[1])).toString();
        } else {
            correct = (2 * parseInt(s[0]) * parseInt(s[2]) + Math.pow(parseInt(s[1]), 2)).toString();
        }
        return { text: `D(${val})`, options: buildOptions(correct, 30), correct, type: 'vd' };
    }

    function makeComplementQ(digits) {
        let numStr = "";
        for(let i=0; i<digits; i++) numStr += rand(i===0?1:0, 9).toString();
        if(Math.random() < 0.3) numStr = numStr.slice(0, -1) + "0";
        if(Math.random() < 0.1) numStr = numStr.slice(0, -2) + "00";
        
        let num = parseInt(numStr);
        const correct = (Math.pow(10, digits) - num).toString();
        return { text: `Complement of ${numStr}`, options: buildOptions(correct, 100), correct, type: 'cp' };
    }

    function makeRangeMulQ(min1, max1, min2, max2) {
        const a = rand(min1, max1);
        const b = rand(min2, max2);
        const correct = (a*b).toString();
        return { text: `${a} × ${b}`, options: buildOptions(correct, 50), correct, type: 'vd' };
    }

    function makeZeroMidMulQ(zeros) {
        const aStr = rand(1,9) + "0".repeat(zeros) + rand(1,9);
        const bStr = rand(1,9) + "0".repeat(zeros) + rand(1,9);
        const correct = (BigInt(aStr) * BigInt(bStr)).toString();
        return { text: `${aStr} × ${bStr}`, options: buildOptions(correct, 250), correct, type: 'vd' };
    }

    /* ────────────────────────────────────────────────
       Generate all 220 questions mapped perfectly to user spec
    ──────────────────────────────────────────────── */
    function generateQuestions() {
        if (questions.length >= TOTAL) return;
        const pool = [];

        const appendShuffled = (block) => {
            for (let i = block.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [block[i], block[j]] = [block[j], block[i]];
            }
            pool.push(...block);
        };

        let b;
        
        b=[]; for(let i=0;i<5;i++) b.push(makeAddQ(2,2)); appendShuffled(b);
        b=[]; for(let i=0;i<5;i++) b.push(makeAddQ(3,2)); appendShuffled(b);
        b=[]; for(let i=0;i<5;i++) b.push(makeAddQ(3,3)); appendShuffled(b);
        
        b=[]; for(let i=0;i<10;i++) b.push(makeMulQ(2,1)); appendShuffled(b);
        b=[]; for(let i=0;i<10;i++) b.push(makeMulQ(2,2)); appendShuffled(b);

        let sp1 = [5, 50, 500]; b=[]; for(let i=0;i<10;i++) b.push(makeMulFixedQ(3, [sp1[i%3]])); appendShuffled(b);
        let sp2 = [125, 25, 250]; b=[]; for(let i=0;i<10;i++) b.push(makeMulFixedQ(4, [sp2[i%3]])); appendShuffled(b);
        
        b=[]; for(let i=0;i<10;i++) b.push(makeMulFixedQ(6, [101])); appendShuffled(b);
        b=[]; for(let i=0;i<10;i++) b.push(makeMulRangeQ(4, 11, 19)); appendShuffled(b);
        
        b=[]; for(let i=0;i<5;i++) b.push(makeSqSumQ()); appendShuffled(b);
        b=[]; for(let i=0;i<10;i++) b.push(makeSqQ(2)); appendShuffled(b);
        
        b=[]; for(let i=0;i<8;i++) b.push(makeMulSumQ()); appendShuffled(b);
        b=[]; for(let i=0;i<8;i++) b.push(makeSeries9SqQ()); appendShuffled(b);
        
        b=[]; for(let i=0;i<8;i++) b.push(makeMulNinesQ(4, 4)); appendShuffled(b);
        b=[]; for(let i=0;i<8;i++) b.push(makeMulNinesQ(4, 6)); appendShuffled(b);
        b=[]; for(let i=0;i<8;i++) b.push(makeMulNinesQ(4, 2)); appendShuffled(b);
        
        b=[]; for(let i=0;i<8;i++) b.push(makeAlgebraSqQ()); appendShuffled(b);
        b=[]; for(let i=0;i<8;i++) b.push(make10_0XSqQ()); appendShuffled(b);
        b=[]; for(let i=0;i<10;i++) b.push(makeBaseSubQ()); appendShuffled(b);
        
        b=[]; for(let i=0;i<8;i++) b.push(makeDuplexQ(2)); appendShuffled(b);
        b=[]; for(let i=0;i<8;i++) b.push(makeDuplexQ(3)); appendShuffled(b);
        
        b=[]; for(let i=0;i<10;i++) b.push(makeComplementQ(6)); appendShuffled(b);
        
        b=[]; for(let i=0;i<7;i++) b.push(makeRangeMulQ(91, 99, 91, 99)); appendShuffled(b);
        b=[]; for(let i=0;i<7;i++) b.push(makeRangeMulQ(101, 110, 101, 110)); appendShuffled(b);
        
        b=[]; for(let i=0;i<7;i++) b.push(makeZeroMidMulQ(1)); appendShuffled(b);
        b=[]; for(let i=0;i<7;i++) b.push(makeZeroMidMulQ(2)); appendShuffled(b);
        
        b=[]; for(let i=0;i<5;i++) b.push(makeMulEnd1Q(2)); appendShuffled(b);
        b=[]; for(let i=0;i<5;i++) b.push(makeMulEnd1Q(3)); appendShuffled(b);

        questions = pool;
        sessionStorage.setItem('bv1_questions', JSON.stringify(questions));
    }

    /* ── Render ── */
    function renderPage(page) {
        currentPage = page;
        const el    = document.getElementById('questions');
        el.innerHTML = '';
        const start = (page - 1) * PER_PAGE;
        const pageQs = questions.slice(start, start + PER_PAGE);

        pageQs.forEach((q, i) => {
            const idx   = start + i;
            let badge   = '';
            if (q.type === 'add') badge = '<span class="q-badge badge-add">Add/Sub</span>';
            else if (q.type === 'mul') badge = '<span class="q-badge badge-mul">Multiply</span>';
            else if (q.type === 'sq') badge = '<span class="q-badge badge-sq">Square</span>';
            else if (q.type === 'alg') badge = '<span class="q-badge badge-alg">Algebra</span>';
            else if (q.type === 'cp') badge = '<span class="q-badge badge-cp">Complement</span>';
            else if (q.type === 'vd') badge = '<span class="q-badge badge-vd">Vedic</span>';

            const card = document.createElement('div');
            card.className = 'q-card';
            let displayQ = q.type !== 'alg' ? q.text.replace(/\+/g, ' + ').replace(/\-/g, ' - ') : q.text;

            card.innerHTML = `
                <div class="q-top">
                    <div class="q-num">${idx + 1}</div>
                    <div class="q-expr">${displayQ} = ?</div>
                    ${badge}
                </div>
                <div class="opts">
                    ${q.options.map(o => `
                        <button class="opt${answers[idx] === o ? ' selected' : ''}"
                                onclick="pick(${idx},'${o}')">${o}</button>
                    `).join('')}
                </div>`;
            el.appendChild(card);
        });

        renderPagination();
        updateStats();
    }

    function renderPagination() {
        const nav = document.getElementById('pagination');
        nav.innerHTML = '';
        for (let i = 1; i <= PAGES; i++) {
            const s    = (i - 1) * PER_PAGE;
            const done = questions.slice(s, s + PER_PAGE).some((_, j) => answers[s + j] != null);
            const btn  = document.createElement('button');
            btn.className  = `pg-btn${i === currentPage ? ' active' : ''}${done ? ' touched' : ''}`;
            btn.textContent = i;
            btn.onclick = () => { renderPage(i); scrollTo({ top: 0, behavior: 'smooth' }); };
            nav.appendChild(btn);
        }
    }

    function pick(idx, val) {
        answers[idx] = val; 
        sessionStorage.setItem('bv1_answers', JSON.stringify(answers));
        renderPage(currentPage);
    }

    function updateStats() {
        const n = Object.keys(answers).length;
        document.getElementById('attempted').textContent = n;
        document.getElementById('progressBar').style.width = (n / TOTAL * 100) + '%';
    }

    /* ── Timer ── */
    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            sessionStorage.setItem('bv1_time', timeLeft);
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer').textContent = `${m}:${s < 10 ? '0' + s : s}`;
            if (timeLeft <= 0) handleSubmission();
        }, 1000);
    }

    /* ── Submit ── */
    function handleSubmission() {
        clearInterval(timerInterval);

        let correct = 0;
        questions.forEach((q, i) => { if (answers[i] === q.correct) correct++; });

        const attempted = Object.keys(answers).length;
        const wrong     = attempted - correct;
        const skipped   = TOTAL - attempted;
        const pct       = Math.round((correct / TOTAL) * 100);
        const band      = getGrade(pct);

        document.getElementById('scoreNum').textContent       = correct;
        document.getElementById('scorePct').textContent       = pct + '%';
        document.getElementById('scorePct').style.color       = band.color;

        const badge = document.getElementById('gradeBadge');
        badge.textContent       = band.grade;
        badge.style.background  = band.bg;
        badge.style.color       = band.color;

        const bar = document.getElementById('resultBar');
        bar.style.background = band.bar;
        setTimeout(() => { bar.style.width = pct + '%'; }, 50);

        document.getElementById('rsCorrect').textContent = correct;
        document.getElementById('rsWrong').textContent   = wrong;
        document.getElementById('rsSkipped').textContent = skipped;
        // Retrieve details from session
        const sName = sessionStorage.getItem("studentName") || "Unknown";
        const sBranch = sessionStorage.getItem("studentBranch") || "Unknown";
        
        // Generate current IST Date & Time
        const istDateTime = new Date().toLocaleString("en-IN", { 
            timeZone: "Asia/Kolkata",
            dateStyle: "medium", 
            timeStyle: "medium" 
        });

        // Inject into DOM
        document.getElementById('resName').textContent = sName;
        document.getElementById('resBranch').textContent = sBranch;
        document.getElementById('resDateTime').textContent = istDateTime + " (IST)";

        // Clear details so they vanish if the user navigates away directly
        sessionStorage.removeItem("studentName");
        sessionStorage.removeItem("studentBranch");

        document.getElementById('resultModal').classList.add('open');
        sessionStorage.removeItem('bv1_questions');
        sessionStorage.removeItem('bv1_answers');
        sessionStorage.removeItem('bv1_time');
    }

    /* ── Back Warning ── */
    function confirmBack() { document.getElementById('backWarn').classList.add('open'); }
    function closeBackWarn() { document.getElementById('backWarn').classList.remove('open'); }
    function goBack() {
        sessionStorage.removeItem('bv1_questions');
        sessionStorage.removeItem('bv1_answers');
        sessionStorage.removeItem('bv1_time');
        window.location.href = 'index.html';
    }
    function retakeTest() {
        sessionStorage.removeItem('bv1_questions');
        sessionStorage.removeItem('bv1_answers');
        sessionStorage.removeItem('bv1_time');
        location.reload();
    }

    /* ── Init ── */
    generateQuestions();
    const im = Math.floor(timeLeft / 60), is = timeLeft % 60;
    document.getElementById('timer').textContent = `${im}:${is < 10 ? '0' + is : is}`;
    renderPage(1);
    startTimer();
</script>
</body>
</html>
