<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beginner 2 - Abacus Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f4f8; --surface: #ffffff; --border: #dce3ed; --border-hover: #94a3b8;
            --text-primary: #1e293b; --text-secondary: #475569; --text-muted: #94a3b8;
            --brand: #1e40af; --brand-light: #2563eb; --accent: #2563eb; --accent-light: #eff6ff;
            --green: #16a34a; --green-bg: #f0fdf4; --red: #dc2626; --red-bg: #fef2f2;
            --amber: #d97706; --amber-bg: #fffbeb; --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-primary); line-height: 1.5; }
        
        header {
            position: sticky; top: 0; z-index: 100; background: var(--surface);
            border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px; background: none;
            border: 1px solid var(--border); color: var(--text-secondary);
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
        }
        .back-btn:hover { background: var(--bg); border-color: var(--border-hover); }
        .header-title { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
        .header-level { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .header-stat { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
        .header-stat strong { font-weight: 700; color: var(--text-primary); }
        .timer-val { color: var(--red) !important; font-variant-numeric: tabular-nums; }
        .divider-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border); }

        .container { max-width: 820px; margin: 0 auto; padding: 24px 20px 60px; }
        .progress-track { height: 3px; background: var(--border); border-radius: 4px; margin-bottom: 28px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }
        
        .q-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 20px 24px; margin-bottom: 12px;
        }
        .q-top { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
        .q-num {
            width: 28px; height: 28px; border-radius: 6px; background: var(--bg); display: flex;
            align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text-secondary);
        }
        .q-expr { font-family: 'JetBrains Mono', monospace; font-size: 17px; font-weight: 700; letter-spacing: 0.5px; }
        .opts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .opt {
            background: var(--surface); border: 1.5px solid var(--border); padding: 10px 8px;
            border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 15px; text-align: center;
        }
        .opt:hover { background: var(--accent-light); border-color: var(--accent); }
        .opt.selected { background: var(--brand); color: #fff; border-color: var(--brand); }

        .pagination { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; margin: 32px 0; }
        .pg-btn {
            width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface); cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text-secondary);
        }
        .pg-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }
        .pg-btn.touched { background: var(--green-bg); color: var(--green); border-color: #bbf7d0; }

        .submit-btn {
            display: block; width: 100%; max-width: 260px; margin: 0 auto; padding: 14px 24px;
            background: var(--brand); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer;
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none;
            align-items: center; justify-content: center; z-index: 500; padding: 20px; backdrop-filter: blur(4px);
        }
        .overlay.open { display: flex; }
        .dialog { background: var(--surface); border-radius: 14px; width: 100%; max-width: 380px; text-align: center; padding: 28px 24px 24px; }
        .warn-icon { width: 44px; height: 44px; border-radius: 50%; background: var(--red-bg); display: flex; margin: 0 auto 16px; align-items: center; justify-content: center; }
        .warn-actions { display: flex; gap: 8px; margin-top: 20px;}
        .warn-actions button { flex: 1; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; }
        .btn-cancel { background: var(--bg); border: 1px solid var(--border); }
        .btn-danger { background: var(--red); color: white; }

        .result-dialog { max-width: 440px; padding: 0; }
        .result-top { padding: 28px; }
        .score-display { padding: 0 0 16px; }
        .score-big { font-size: 56px; font-weight: 900; }
        .result-bar-track { height: 4px; background: var(--border); margin: 0 28px; border-radius: 4px; }
        .result-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
        .result-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); margin: 20px 28px 0; border-radius: 8px; overflow: hidden; }
        .rs-item { background: var(--surface); padding: 14px 8px; }
        .rs-val { font-size: 20px; font-weight: 800; }
        .rs-lbl { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        .grade-badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-top: 12px; }
        .result-footer { display: flex; gap: 8px; padding: 20px 28px; }
        .result-footer button { flex: 1; padding: 11px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; }
        .rf-secondary { background: var(--bg); border: 1px solid var(--border); }
        .rf-primary { background: var(--brand); color: white; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button class="back-btn" onclick="confirmBack()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
            Back
        </button>
        <div>
            <div class="header-title">Abacus Assessment</div>
            <div class="header-level">Beginner 2</div>
        </div>
    </div>
    <div class="header-right">
        <span class="header-stat"><strong class="timer-val" id="timer">10:00</strong></span>
        <span class="divider-dot"></span>
        <span class="header-stat"><strong id="attempted">0</strong> / <span id="totalQs"></span></span>
    </div>
</header>

<div class="container">
    <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>
    <div id="questions"></div>
    <div class="pagination" id="pagination"></div>
    <button class="submit-btn" onclick="handleSubmission()">Submit Test</button>
</div>

<div class="overlay" id="backWarn">
    <div class="dialog">
        <div class="warn-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
        <h3>Leave this test?</h3>
        <p>All your answers and remaining time will be lost.</p>
        <div class="warn-actions">
            <button class="btn-cancel" onclick="closeBackWarn()">Continue Test</button>
            <button class="btn-danger" onclick="goBack()">Leave</button>
        </div>
    </div>
</div>

<div class="overlay" id="resultModal">
    <div class="dialog result-dialog">
        <div class="result-top">
            <h2>Test Complete</h2><span class="sub" style="font-size:12px; color:var(--text-muted)">Beginner 2 Assessment</span>
        </div>
        <div style="background: var(--bg); margin: 16px 28px 0; padding: 12px 16px; border-radius: 8px; font-size: 12px; color: var(--text-secondary); border: 1px solid var(--border);">
            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                <span><strong>Name:</strong> <span id="resName"></span></span>
                <span><strong>Branch:</strong> <span id="resBranch"></span></span>
            </div>
            <div style="display: flex; justify-content: center; margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border-hover); font-weight: 500;">
                <span id="resDateTime"></span>
            </div>
        </div>
        <div class="score-display">
            <span class="score-big" id="scoreNum">0</span><span style="font-size:20px; font-weight:600; color:var(--text-muted)"> / <span id="resTotal"></span></span>
            <div style="font-size:13px; font-weight:600; margin-top:4px;" id="scorePct">0%</div>
            <div class="grade-badge" id="gradeBadge">-</div>
        </div>
        <div class="result-bar-track"><div class="result-bar-fill" id="resultBar"></div></div>
        <div class="result-stats">
            <div class="rs-item"><div class="rs-val" id="rsCorrect" style="color:var(--green)">0</div><div class="rs-lbl">Correct</div></div>
            <div class="rs-item"><div class="rs-val" id="rsWrong" style="color:var(--red)">0</div><div class="rs-lbl">Wrong</div></div>
            <div class="rs-item"><div class="rs-val" id="rsSkipped" style="color:var(--amber)">0</div><div class="rs-lbl">Skipped</div></div>
        </div>
        <div class="result-footer">
            <button class="rf-secondary" onclick="retakeTest()">Retake</button>
            <button class="rf-primary" onclick="location.href='index.html'">Back to Dashboard</button>
        </div>
    </div>
</div>

<script>
    const rawData = [
        { q: "55+33-66", o: [22, 23, 32, 42] },
        { q: "11+33-22", o: [23, 32, 22, 12] },
        { q: "44+55-33", o: [76, 56, 57, 66] },
        { q: "66+22-55", o: [33, 23, 24, 34] },
        { q: "99-55-44", o: [10, 1, 2, 0] },
        { q: "69+30-66", o: [23, 24, 32, 33] },
        { q: "29+70-16", o: [73, 74, 83, 84] },
        { q: "11+22+55", o: [78, 79, 87, 88] },
        { q: "99-66-11", o: [22, 23, 24, 32] },
        { q: "36+51-17", o: [60, 71, 70, 73] },
        { q: "33+55-88", o: [0, 1, 2, 3] },
        { q: "11+88-77", o: [32, 21, 23, 22] },
        { q: "35+52+12", o: [98, 79, 99, 89] },
        { q: "22+66+11", o: [89, 99, 98, 97] },
        { q: "44-22+55", o: [87, 97, 88, 77] },
        { q: "49-27+15", o: [38, 36, 37, 47] },
        { q: "85-55+11", o: [34, 41, 42, 43] },
        { q: "99-77-11", o: [22, 33, 11, 12] },
        { q: "39+60-23", o: [66, 77, 78, 76] },
        { q: "88-22+33", o: [89, 98, 97, 99] },
        { q: "77+11-88", o: [2, 3, 1, 0] },
        { q: "54+45-99", o: [0, 1, 2, 3] },
        { q: "44-22+77", o: [89, 78, 98, 99] },
        { q: "11+66+11", o: [78, 98, 88, 89] },
        { q: "75+11-85", o: [2, 0, 1, 3] },
        { q: "29-14-15", o: [0, 1, 3, 2] },
        { q: "22-11+55", o: [76, 66, 56, 55] },
        { q: "15+11-16", o: [20, 11, 10, 13] },
        { q: "25+52+22", o: [89, 99, 98, 97] },
        { q: "75+11-66", o: [30, 10, 20, 21] },
        { q: "99-68+11", o: [42, 32, 43, 44] },
        { q: "32+57+10", o: [89, 98, 97, 99] },
        { q: "61+15+21", o: [98, 99, 97, 87] },
        { q: "84-62-22", o: [1, 3, 2, 0] },
        { q: "41+51-71", o: [31, 21, 22, 23] },
        { q: "22+15-26", o: [12, 21, 11, 31] },
        { q: "96-66+14", o: [34, 42, 43, 44] },
        { q: "28+51+20", o: [89, 78, 97, 99] },
        { q: "11+76-32", o: [45, 65, 56, 55] },
        { q: "35+64-29", o: [80, 78, 77, 70] },
        { q: "18+30-26", o: [32, 23, 21, 22] },
        { q: "33+56+10", o: [98, 97, 99, 89] },
        { q: "24+55-79", o: [3, 1, 2, 0] },
        { q: "72+25-65", o: [23, 32, 31, 35] },
        { q: "36+53-66", o: [32, 23, 24, 22] },
        { q: "86+13-24", o: [65, 55, 76, 75] },
        { q: "84+15-55", o: [54, 34, 44, 45] },
        { q: "88-66-11", o: [12, 11, 10, 21] },
        { q: "49+50-33", o: [56, 46, 66, 65] },
        { q: "53+47-78", o: [31, 11, 21, 22] },
        { q: "55+42-77", o: [30, 10, 20, 21] },
        { q: "42+56-40", o: [58, 59, 49, 48] },
        { q: "11+67-55", o: [32, 23, 22, 21] },
        { q: "45-25+24", o: [34, 44, 45, 46] },
        { q: "59+40-28", o: [71, 81, 72, 73] },
        { q: "68+11-22", o: [58, 57, 56, 68] },
        { q: "30+54+15", o: [89, 99, 98, 88] },
        { q: "75+22-42", o: [45, 65, 55, 54] },
        { q: "21+66-87", o: [0, 1, 3, 2] },
        { q: "44-23+68", o: [89, 88, 87, 99] },
        { q: "11+22-33", o: [1, 3, 2, 0] },
        { q: "69+30-55", o: [34, 24, 44, 54] },
        { q: "82+15-52", o: [55, 45, 35, 44] },
        { q: "35+51-26", o: [70, 60, 50, 51] },
        { q: "70+27-45", o: [42, 52, 53, 54] },
        { q: "66-55+33", o: [54, 34, 44, 42] },
        { q: "33+55-68", o: [10, 30, 21, 20] },
        { q: "99-68-31", o: [3, 1, 0, 2] },
        { q: "45+4-16", o: [23, 33, 32, 34] },
        { q: "55+2+42", o: [89, 98, 88, 99] },
        { q: "60+9-66", o: [2, 1, 0, 3] },
        { q: "78-7+28", o: [99, 98, 97, 89] },
        { q: "43+5-26", o: [32, 22, 23, 24] },
        { q: "66-5+35", o: [69, 96, 97, 86] },
        { q: "24-3+53", o: [64, 74, 77, 75] },
        { q: "74+5-79", o: [0, 3, 2, 1] }
    ];

    const TOTAL = rawData.length;
    const PER_PAGE = 25;
    const PAGES = Math.ceil(TOTAL / PER_PAGE);

    document.getElementById('totalQs').textContent = TOTAL;
    document.getElementById('resTotal').textContent = TOTAL;

    function evaluateMath(str) { return Function(`'use strict'; return (${str})`)(); }

    let questions = JSON.parse(sessionStorage.getItem('b2_questions'));
    if (!questions) {
        questions = rawData.map(item => ({
            text: item.q, options: item.o.sort(() => Math.random() - 0.5), correct: evaluateMath(item.q)
        }));
        for (let i = questions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [questions[i], questions[j]] = [questions[j], questions[i]];
        }
        sessionStorage.setItem('b2_questions', JSON.stringify(questions));
    }

    let answers = JSON.parse(sessionStorage.getItem('b2_answers')) || {};
    let timeLeft = parseInt(sessionStorage.getItem('b2_time')) || 600;
    let currentPage = 1;
    let timerInterval;

    const GRADES = [
        { min: 95, grade: 'A+', color: '#166534', bg: '#dcfce7', bar: '#16a34a' },
        { min: 85, grade: 'A',  color: '#155e75', bg: '#cffafe', bar: '#0891b2' },
        { min: 70, grade: 'B',  color: '#1e40af', bg: '#dbeafe', bar: '#3b82f6' },
        { min: 55, grade: 'C',  color: '#92400e', bg: '#fef3c7', bar: '#d97706' },
        { min: 40, grade: 'D',  color: '#9a3412', bg: '#ffedd5', bar: '#ea580c' },
        { min: 0,  grade: 'F',  color: '#991b1b', bg: '#fee2e2', bar: '#dc2626' }
    ];
    const getGrade = pct => GRADES.find(g => pct >= g.min);

    function renderPage(page) {
        currentPage = page;
        const el = document.getElementById('questions'); el.innerHTML = '';
        const start = (page - 1) * PER_PAGE;

        questions.slice(start, start + PER_PAGE).forEach((q, i) => {
            const idx = start + i;
            let displayQ = q.text.replace(/\+/g, ' + ').replace(/\-/g, ' - ');
            const card = document.createElement('div'); card.className = 'q-card';
            card.innerHTML = `<div class="q-top"><div class="q-num">${idx + 1}</div><div class="q-expr">${displayQ} = ?</div></div>
                <div class="opts">${q.options.map(o => `<button class="opt${answers[idx] === o ? ' selected' : ''}" onclick="pick(${idx},${o})">${o}</button>`).join('')}</div>`;
            el.appendChild(card);
        });
        renderPagination(); updateStats();
    }

    function renderPagination() {
        const nav = document.getElementById('pagination'); nav.innerHTML = '';
        for (let i = 1; i <= PAGES; i++) {
            const s = (i - 1) * PER_PAGE;
            const done = questions.slice(s, s + PER_PAGE).some((_, j) => answers[s + j] != null);
            const btn = document.createElement('button');
            btn.className = `pg-btn${i === currentPage ? ' active' : ''}${done ? ' touched' : ''}`;
            btn.textContent = i; btn.onclick = () => { renderPage(i); scrollTo({ top: 0, behavior: 'smooth' }); };
            nav.appendChild(btn);
        }
    }

    function pick(idx, val) { answers[idx] = val; sessionStorage.setItem('b2_answers', JSON.stringify(answers)); renderPage(currentPage); }
    function updateStats() {
        const n = Object.keys(answers).length; document.getElementById('attempted').textContent = n;
        document.getElementById('progressBar').style.width = (n / TOTAL * 100) + '%';
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--; sessionStorage.setItem('b2_time', timeLeft);
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer').textContent = `${m}:${s < 10 ? '0' + s : s}`;
            if (timeLeft <= 0) handleSubmission();
        }, 1000);
    }

    function handleSubmission() {
        clearInterval(timerInterval);
        let correct = 0; questions.forEach((q, i) => { if (answers[i] === q.correct) correct++; });
        const attempted = Object.keys(answers).length, wrong = attempted - correct, skipped = TOTAL - attempted;
        const pct = Math.round((correct / TOTAL) * 100), band = getGrade(pct);

        document.getElementById('scoreNum').textContent = correct;
        document.getElementById('scorePct').textContent = pct + '%'; document.getElementById('scorePct').style.color = band.color;
        const badge = document.getElementById('gradeBadge'); badge.textContent = band.grade; badge.style.background = band.bg; badge.style.color = band.color;
        document.getElementById('resultBar').style.background = band.bar; setTimeout(() => { document.getElementById('resultBar').style.width = pct + '%'; }, 50);
        document.getElementById('rsCorrect').textContent = correct; document.getElementById('rsWrong').textContent = wrong; document.getElementById('rsSkipped').textContent = skipped;
        // Retrieve details from session
        const sName = sessionStorage.getItem("studentName") || "Unknown";
        const sBranch = sessionStorage.getItem("studentBranch") || "Unknown";
        
        // Generate current IST Date & Time
        const istDateTime = new Date().toLocaleString("en-IN", { 
            timeZone: "Asia/Kolkata",
            dateStyle: "medium", 
            timeStyle: "medium" 
        });

        // Inject into DOM
        document.getElementById('resName').textContent = sName;
        document.getElementById('resBranch').textContent = sBranch;
        document.getElementById('resDateTime').textContent = istDateTime + " (IST)";

        // Clear details so they vanish if the user navigates away directly
        sessionStorage.removeItem("studentName");
        sessionStorage.removeItem("studentBranch");
        document.getElementById('resultModal').classList.add('open');
        sessionStorage.removeItem('b2_questions'); sessionStorage.removeItem('b2_answers'); sessionStorage.removeItem('b2_time');
    }

    function confirmBack() { document.getElementById('backWarn').classList.add('open'); }
    function closeBackWarn() { document.getElementById('backWarn').classList.remove('open'); }
    function goBack() { sessionStorage.removeItem('b2_questions'); sessionStorage.removeItem('b2_answers'); sessionStorage.removeItem('b2_time'); window.location.href = 'index.html'; }
    function retakeTest() { sessionStorage.removeItem('b2_questions'); sessionStorage.removeItem('b2_answers'); sessionStorage.removeItem('b2_time'); location.reload(); }

    const im = Math.floor(timeLeft / 60), is = timeLeft % 60; document.getElementById('timer').textContent = `${im}:${is < 10 ? '0' + is : is}`;
    renderPage(1); startTimer();
</script>
</body>
</html>
